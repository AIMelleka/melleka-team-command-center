<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0a0a0a; color: #e5e5e5; margin: 0; padding: 40px 20px;">
  <div style="max-width: 420px; margin: 0 auto; background-color: #171717; border: 1px solid #262626; border-radius: 12px; padding: 40px 32px; text-align: center;">
    <h1 style="font-size: 22px; font-weight: 700; color: #ffffff; margin: 0 0 8px;">Password Reset</h1>
    <p style="font-size: 14px; color: #a3a3a3; margin: 0 0 28px;">Enter this code on the login page to reset your password.</p>
    <div style="background-color: #262626; border: 1px solid #404040; border-radius: 8px; padding: 20px; margin: 0 0 28px;">
      <span style="font-size: 32px; font-weight: 700; letter-spacing: 6px; color: #ffffff; font-family: monospace;">{{ .Token }}</span>
    </div>
    <p style="font-size: 13px; color: #737373; margin: 0;">This code expires in 1 hour. If you didn't request this, ignore this email.</p>
  </div>
</body>
</html>
